<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Detalle - ResearchWatch</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>R</text></svg>" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" crossorigin="anonymous" />
  <link rel="stylesheet" href="../../assets/css/recuedu.css" />
  <link rel="stylesheet" href="../../assets/css/recuedu-topbar.css" />
  <link rel="stylesheet" href="style.css" />
  <style>
    .detail-hero { background: linear-gradient(135deg,#1e40af,#0f172a); color:#fff; padding:1.5rem 0 2rem; }
    .detail-back { display:inline-flex; align-items:center; gap:.4rem; color:rgba(255,255,255,.75); font-size:.82rem; text-decoration:none; margin-bottom:1rem; }
    .detail-back:hover { color:#fff; }
    .detail-hero h1 { font-size:1.55rem; font-weight:800; margin:0 0 .5rem; line-height:1.25; }
    .detail-hero-meta { font-size:.82rem; opacity:.8; margin-bottom:.75rem; display:flex; flex-wrap:wrap; gap:.25rem .75rem; align-items:center; }
    .detail-hero-meta span { display:flex; align-items:center; gap:.3rem; }
    .detail-badges { display:flex; flex-wrap:wrap; gap:.4rem; margin-top:.5rem; }
    .detail-main { padding-top:1.75rem; padding-bottom:3rem; display:flex; flex-direction:column; gap:1.5rem; }
    .metrics-row { display:grid; grid-template-columns:repeat(auto-fill, minmax(140px, 1fr)); gap:.75rem; }
    .metric-card { background:var(--bg-card,#fff); border:1px solid var(--border,#e2e8f0); border-radius:10px; padding:.9rem 1rem; text-align:center; }
    .metric-value { font-size:1.6rem; font-weight:800; color:var(--primary,#3b82f6); line-height:1; }
    .metric-label { font-size:.72rem; color:var(--text-muted,#475569); text-transform:uppercase; letter-spacing:.04em; margin-top:.25rem; }
    .links-row { display:flex; flex-wrap:wrap; gap:.5rem; }
    .link-btn { display:inline-flex; align-items:center; gap:.35rem; padding:.35rem .85rem; border-radius:6px; font-size:.8rem; font-weight:600; text-decoration:none; border:1px solid var(--border,#e2e8f0); background:var(--bg-card,#fff); color:var(--text-main,#0f172a); }
    .link-btn:hover { background:var(--primary,#3b82f6); color:#fff; border-color:transparent; }
    .section-title { font-size:.82rem; font-weight:700; text-transform:uppercase; letter-spacing:.05em; color:var(--text-muted,#475569); margin-bottom:.65rem; }
    .detail-calls-empty { font-size:.85rem; color:var(--text-muted,#94a3b8); padding:1rem 1.25rem; }
  </style>
</head>
<body>
  <div class="recuedu-topbar">
    <div class="topbar-container">
      <a class="topbar-brand" href="../../index.html">
        <i class="fa-solid fa-flask-vial"></i> RecuEdu Labs
      </a>
      <div class="topbar-links">
        <a href="index.html">ResearchWatch</a>
        <a href="https://github.com/ravellom" target="_blank" rel="noopener">
          <i class="fa-brands fa-github"></i>
        </a>
      </div>
    </div>
  </div>

  <div class="detail-hero">
    <div class="container">
      <a class="detail-back" href="index.html"><i class="fa-solid fa-arrow-left"></i> Volver al listado</a>
      <h1 id="d-name">Cargando...</h1>
      <div class="detail-hero-meta" id="d-meta"></div>
      <div class="detail-badges" id="d-badges"></div>
    </div>
  </div>

  <main class="container detail-main">
    <div id="d-metrics-wrap" style="display:none">
      <p class="section-title">Metricas</p>
      <div class="metrics-row" id="d-metrics"></div>
    </div>

    <div id="d-links-wrap" style="display:none">
      <p class="section-title">Acceder en</p>
      <div class="links-row" id="d-links"></div>
    </div>

    <div id="d-areas-wrap" style="display:none">
      <p class="section-title">Areas tematicas</p>
      <div class="area-tags" id="d-areas"></div>
    </div>

    <div id="d-topics-wrap" style="display:none">
      <p class="section-title">Topics</p>
      <div class="area-tags" id="d-topics"></div>
    </div>

    <div id="d-notes-wrap" style="display:none">
      <p class="section-title">Notas</p>
      <p id="d-notes" style="font-size:.88rem; color:var(--text-muted,#475569)"></p>
    </div>

    <section class="card rw-card">
      <div class="rw-card-header">
        <h2><i class="fa-solid fa-bullhorn"></i> Calls activos</h2>
      </div>
      <div id="d-calls-content">
        <p class="detail-calls-empty"><i class="fa-solid fa-circle-notch fa-spin"></i> Cargando...</p>
      </div>
    </section>

    <section class="card rw-card">
      <div class="rw-card-header">
        <h2><i class="fa-solid fa-rss"></i> Feed reciente</h2>
      </div>
      <div id="d-articles-content">
        <p class="detail-calls-empty"><i class="fa-solid fa-circle-notch fa-spin"></i> Cargando...</p>
      </div>
    </section>
  </main>

  <div id="loading-overlay" class="loading-overlay">
    <i class="fa-solid fa-satellite-dish fa-spin"></i>
    <span>Cargando datos...</span>
  </div>

  <div id="error-banner" class="error-banner" style="display:none">
    <i class="fa-solid fa-triangle-exclamation"></i>
    <span id="error-msg">No se pudieron cargar los datos.</span>
  </div>

  <script>
    const TYPE_LABELS = {
      cfp: "CFP",
      special_issue: "Special Issue",
      monographic: "Monografico",
      project_call: "Project call",
    };

    document.addEventListener("DOMContentLoaded", init);

    async function init() {
      const params = new URLSearchParams(location.search);
      const id = params.get("id");
      const type = params.get("type") || "journal";

      if (!id) {
        showError("Parametro ?id= no encontrado.");
        hideLoading();
        return;
      }

      try {
        const [sourcesData, callsData] = await Promise.all([
          fetch("data/research-watch-sources.json").then((r) => {
            if (!r.ok) throw new Error(`HTTP ${r.status}`);
            return r.json();
          }),
          fetch("data/research-watch.json").then((r) => {
            if (!r.ok) throw new Error(`HTTP ${r.status}`);
            return r.json();
          }),
        ]);

        const collections = {
          journal: sourcesData.journals || [],
          conference: sourcesData.conferences || [],
          funding_source: sourcesData.funding_sources || [],
        };
        const source = (collections[type] || []).find((item) => item.id === id);

        if (!source) {
          showError(`Fuente con id="${id}" no encontrada.`);
          hideLoading();
          return;
        }

        const activeCalls = (callsData.calls || []).filter((call) => call.source?.id === id);
        renderDetail(source, activeCalls, type);
        hideLoading();
      } catch (error) {
        showError("No se pudieron cargar los datos: " + error.message);
        hideLoading();
      }
    }

    function renderDetail(source, calls, type) {
      document.title = `${source.name} - ResearchWatch`;
      setText("d-name", source.name);

      const meta = [];
      if (type === "journal" && source.issn) meta.push(`<span><i class="fa-solid fa-barcode"></i> pISSN ${escHtml(source.issn)}</span>`);
      if (type === "journal" && source.eissn && source.eissn !== source.issn) meta.push(`<span><i class="fa-solid fa-barcode"></i> eISSN ${escHtml(source.eissn)}</span>`);
      if (source.publisher) meta.push(`<span><i class="fa-solid fa-building"></i> ${escHtml(source.publisher)}</span>`);
      if (source.acronym) meta.push(`<span><i class="fa-solid fa-tag"></i> ${escHtml(source.acronym)}</span>`);
      if (source.periodicity) meta.push(`<span><i class="fa-solid fa-rotate"></i> ${escHtml(source.periodicity)}</span>`);
      if (source.program_type) meta.push(`<span><i class="fa-solid fa-landmark"></i> ${escHtml(source.program_type)}</span>`);
      document.getElementById("d-meta").innerHTML = meta.join("");

      const badges = [];
      if (source.quartile) badges.push(`<span class="source-if">${escHtml(source.quartile)}</span>`);
      if (source.impact_factor) badges.push(`<span class="source-if">IF ${escHtml(String(source.impact_factor))}</span>`);
      if (type === "journal" && source.scopus_active === true) badges.push('<span class="source-if">SCOPUS activa</span>');
      if (type === "journal" && source.scopus_active === false) badges.push('<span class="source-if">SCOPUS inactiva</span>');
      document.getElementById("d-badges").innerHTML = badges.join("");

      const metrics = source.openalex || {};
      if (metrics.works_count !== undefined || metrics.cited_by_count !== undefined) {
        const cards = [
          { label: "Trabajos", value: fmtNum(metrics.works_count) },
          { label: "Citas", value: fmtNum(metrics.cited_by_count) },
          { label: "H-index", value: metrics.h_index ?? "-" },
          { label: "Citas 2y", value: metrics.mean_citations_2yr != null ? Number(metrics.mean_citations_2yr).toFixed(2) : "-" },
        ];
        document.getElementById("d-metrics").innerHTML = cards.map((card) => `
          <div class="metric-card">
            <div class="metric-value">${escHtml(String(card.value))}</div>
            <div class="metric-label">${escHtml(card.label)}</div>
          </div>
        `).join("");
        show("d-metrics-wrap");
      }

      const links = [
        source.url ? { label: "Sitio web", icon: "fa-arrow-up-right-from-square", url: source.url } : null,
        source.rss_url ? { label: "RSS", icon: "fa-rss", url: source.rss_url } : null,
        source.links?.openalex ? { label: "OpenAlex", icon: "fa-magnifying-glass-chart", url: source.links.openalex } : null,
        source.links?.miar ? { label: "MIAR", icon: "fa-database", url: source.links.miar } : null,
        source.links?.doaj ? { label: "DOAJ", icon: "fa-leaf", url: source.links.doaj } : null,
      ].filter(Boolean);

      if (links.length) {
        document.getElementById("d-links").innerHTML = links.map((link) => `
          <a href="${escHtml(link.url)}" target="_blank" rel="noopener" class="link-btn">
            <i class="fa-solid ${link.icon}"></i> ${escHtml(link.label)}
          </a>
        `).join("");
        show("d-links-wrap");
      }

      if ((source.areas || []).length) {
        document.getElementById("d-areas").innerHTML = source.areas.map((area) => `<span class="area-tag">${escHtml(area)}</span>`).join("");
        show("d-areas-wrap");
      }

      if ((metrics.topics || []).length) {
        document.getElementById("d-topics").innerHTML = metrics.topics.map((topic) => `<span class="area-tag" style="background:#ede9fe;color:#6d28d9">${escHtml(topic)}</span>`).join("");
        show("d-topics-wrap");
      }

      if (source.notes) {
        setText("d-notes", source.notes);
        show("d-notes-wrap");
      }

      renderCalls(calls);
      renderArticles(source.recent_entries || []);
    }

    function renderCalls(calls) {
      const target = document.getElementById("d-calls-content");
      if (!calls.length) {
        target.innerHTML = '<p class="detail-calls-empty"><i class="fa-solid fa-circle-info"></i> No hay calls activos en este momento.</p>';
        return;
      }
      target.innerHTML = `
        <div class="rw-table-wrap">
          <table class="rw-table">
            <thead>
              <tr>
                <th class="col-deadline">Deadline</th>
                <th class="col-type">Tipo</th>
                <th class="col-title">Titulo</th>
              </tr>
            </thead>
            <tbody>
              ${calls.map((call) => `
                <tr>
                  <td class="col-deadline">${call.deadline ? fmtDate(call.deadline) : "-"}</td>
                  <td class="col-type"><span class="type-badge type-${call.type}">${escHtml(TYPE_LABELS[call.type] || call.type)}</span></td>
                  <td class="col-title call-title">
                    ${call.url ? `<a href="${escHtml(call.url)}" target="_blank" rel="noopener">${escHtml(call.title)}</a>` : escHtml(call.title)}
                  </td>
                </tr>
              `).join("")}
            </tbody>
          </table>
        </div>
      `;
    }

    function renderArticles(entries) {
      const target = document.getElementById("d-articles-content");
      if (!entries.length) {
        target.innerHTML = '<p class="detail-calls-empty"><i class="fa-solid fa-circle-info"></i> Sin entradas recientes en el feed.</p>';
        return;
      }
      target.innerHTML = `
        <ul class="src-articles" style="padding:1rem 1.25rem">
          ${entries.map((entry) => `
            <li>
              ${entry.url ? `<a href="${escHtml(entry.url)}" target="_blank" rel="noopener">${escHtml(entry.title)}</a>` : escHtml(entry.title)}
              ${entry.published ? `<span class="src-article-date">${escHtml(entry.published)}</span>` : ""}
              ${entry.summary ? `<p class="src-article-summary">${escHtml(entry.summary)}</p>` : ""}
            </li>
          `).join("")}
        </ul>
      `;
    }

    function fmtDate(iso) {
      if (!iso) return "-";
      const [year, month, day] = iso.split("-");
      return `${day}/${month}/${year}`;
    }

    function fmtNum(value) {
      return value != null ? Number(value).toLocaleString("es-ES") : "-";
    }

    function escHtml(value) {
      if (value === null || value === undefined) return "";
      return String(value)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function setText(id, value) {
      const element = document.getElementById(id);
      if (element) element.textContent = value;
    }

    function show(id) {
      const element = document.getElementById(id);
      if (element) element.style.display = "";
    }

    function hideLoading() {
      document.getElementById("loading-overlay")?.classList.add("hidden");
    }

    function showError(message) {
      const banner = document.getElementById("error-banner");
      const msg = document.getElementById("error-msg");
      if (banner) banner.style.display = "flex";
      if (msg) msg.textContent = message;
    }
  </script>
</body>
</html>
