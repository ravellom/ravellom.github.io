services:
  postgres:
    image: postgres:16-alpine
    container_name: survey-suite-next-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: survey_suite_next
      POSTGRES_USER: survey_user
      POSTGRES_PASSWORD: survey_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  minio:
    image: minio/minio:latest
    container_name: survey-suite-next-minio
    command: server /data --console-address ":9001"
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  minio-init:
    image: minio/mc:latest
    container_name: survey-suite-next-minio-init
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      sleep 5;
      /usr/bin/mc alias set local http://minio:9000 minioadmin minioadmin;
      /usr/bin/mc mb -p local/survey-suite-next || true;
      /usr/bin/mc anonymous set none local/survey-suite-next;
      exit 0;
      "

volumes:
  postgres_data:
  minio_data:
